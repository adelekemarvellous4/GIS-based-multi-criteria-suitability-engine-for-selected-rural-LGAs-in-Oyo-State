name: oyo-suitability
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # GIS / Spatial
  - gdal
  - rasterio>=1.3
  - geopandas>=1.0
  - shapely>=2.0
  - pyproj>=3.5
  - fiona>=1.9
  - osmnx>=2.0
  - whitebox>=2.3

  # Numerical / Scientific
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0

  # Visualisation
  - matplotlib>=3.7
  - contextily>=1.3
  - folium>=0.14

  # Notebooks
  - jupyter
  - jupyterlab>=4.0
  - ipykernel
  - ipywidgets>=8.0
  - nbformat

  # Config / Utilities
  - pyyaml>=6.0
  - tqdm>=4.65
  - python-dotenv>=1.0

  # Dashboard
  - pip:
    - streamlit>=1.28
    - reportlab>=4.0
    - fpdf2>=2.7
    - pymcdm>=1.2
    - streamlit-folium>=0.15
